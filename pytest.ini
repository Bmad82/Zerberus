[pytest]
# Patch 176 — Test-Isolation
# E2E-Tests (Playwright) brauchen laufenden Server und werden im Default-Run
# uebersprungen. Explizit ausfuehrbar via `pytest -m e2e`.
addopts = -m "not e2e and not guard_live"
testpaths = zerberus/tests
filterwarnings =
    ignore::DeprecationWarning:pydantic._internal._config
    ignore::DeprecationWarning:faiss.loader
    ignore::DeprecationWarning:setuptools._distutils.version
    # P176: aiosqlite-Cleanup-Thread laeuft asynchron, wenn der Test-Loop schon
    # zu ist. Pytest-Threadexception-Warnung ist kosmetisch — Tests grun.
    ignore::pytest.PytestUnhandledThreadExceptionWarning
